version: '3.8'

networks:
  app-network:
    driver: bridge
    name: network

services:
  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    networks:
      - app-network
    expose:
      - "8080"
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:1.26-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app-network
    security_opt:
      - no-new-privileges:true
